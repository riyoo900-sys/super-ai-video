# Build worker on GitHub first; only then create Release (RunPod rebuild).
name: RunPod Docker Build Verify

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - handler.py
      - wan_engine.py
      - bootstrap.py
      - patch_diffusers.py
      - watermark_ffmpeg.py
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build worker image
        run: docker build -t super-ai-video-wan:test .

      - name: Verify patch inside image
        run: |
          docker run --rm super-ai-video-wan:test \
            python -c "import bootstrap; from diffusers import AutoencoderKLWan, WanPipeline; print('OK wan')"

  release:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release for RunPod
        uses: softprops/action-gh-release@v2
        with:
          tag_name: runpod-${{ github.run_number }}-${{ github.sha }}
          name: RunPod worker build ${{ github.run_number }}
          body: |
            Verified docker build passed.
            Commit: ${{ github.sha }}
          generate_release_notes: true
